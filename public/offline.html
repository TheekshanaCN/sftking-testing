<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Lost - SFT KING</title>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .radar-container { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .radar-ring { position: absolute; inset: 0; border-radius: 50%; border: 4px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 50px rgba(239, 68, 68, 0.2); }
        .radar-spin { position: absolute; inset: 0; border-radius: 50%; border: 4px solid #ef4444; border-top-color: transparent; animation: spin 1s linear infinite; }
        .icon { width: 48px; height: 48px; color: #ef4444; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 10px 0; text-align: center; background: linear-gradient(to bottom, #ffffff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; text-align: center; max-width: 400px; font-size: 1.125rem; line-height: 1.5; margin-bottom: 40px; padding: 0 20px; }
        .status { display: flex; align-items: center; gap: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.875rem; padding: 15px 30px; border-radius: 50px; border: 1px solid; transition: all 0.3s ease; }
        .status.offline { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .status.online { color: #22c55e; background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.2); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s ease infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 50% { opacity: .5; } }
        @media (max-width: 768px) { h1 { font-size: 2.25rem; } p { font-size: 1rem; } }
    </style>
</head>
<body>
    <div class="radar-container">
        <div class="radar-ring"></div>
        <div class="radar-spin"></div>
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.82"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
    </div>
    <h1>Signal Lost</h1>
    <p>Your device has disconnected from the Matrix. Please turn on your Wi-Fi or Mobile Data to enter the platform.</p>
    <div class="status offline" id="status">
        <span class="dot"></span>
        <span id="status-text">Waiting for connection...</span>
    </div>

    <script>
        window.addEventListener('online', () => {
            // Flash green before reload so the user sees feedback
            const status = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            status.classList.replace('offline', 'online');
            statusText.textContent = 'Reconnecting...';
            setTimeout(() => window.location.reload(), 1000);
        });
    </script>
</body>
</html>
